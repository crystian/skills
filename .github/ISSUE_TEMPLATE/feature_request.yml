name: Feature request
description: Suggest an improvement to an existing skill or the plugin tooling.
title: "[feat] "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose improvements. For a brand-new skill, use the "New skill" template instead.
  - type: input
    id: target
    attributes:
      label: Target
      description: Which skill or area does this apply to? (e.g. `skill-optimizer`, `plugin`, `docs`, `CI`)
      placeholder: skill-optimizer
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What friction or gap are you seeing today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What would you like to see instead? Concrete suggestions welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you chose this one.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, examples.
    validations:
      required: false
